<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis 15 Años</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap');

        body { 
            font-family: 'Poppins', sans-serif; 
            background-color: #fce4ec; 
            margin: 0; 
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #880e4f;
            overflow-x: hidden;
            min-height: 100vh;
        }
        
        /* Pantalla de Bienvenida */
        #overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: linear-gradient(135deg, #ad1457 0%, #880e4f 100%); 
            color: white; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            z-index: 1000; transition: opacity 1s ease-in-out, visibility 1s;
        }
        
        #overlay h1 { font-family: 'Great Vibes', cursive; font-size: 3.5rem; margin-bottom: 10px; }

        .btn-entrar { 
            font-family: 'Poppins', sans-serif; font-weight: 600; padding: 15px 40px; 
            cursor: pointer; border-radius: 50px; border: 2px solid white;
            background: transparent; color: white; text-transform: uppercase;
            transition: all 0.3s ease; margin-top: 20px;
        }

        .btn-entrar:hover { background: white; color: #ad1457; }

        /* Contenedor Principal de la Invitación */
        .main-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            padding-bottom: 40px;
        }

        .titulo-principal {
            color: #ad1457; margin: 30px 0 10px 0; 
            font-family: 'Dancing Script', cursive; 
            font-size: 3.5rem; text-align: center;
        }

        /* Galería Mejorada */
        .gallery { 
            position: relative;
            width: 90%; max-width: 340px; height: 500px; /* Aumentamos altura para el texto */
            margin: 10px auto; 
            background: white; 
            border: 10px solid white; 
            border-radius: 20px;
            overflow: hidden; 
            box-shadow: 0 15px 35px rgba(173, 20, 87, 0.2);
        }

        .slide {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0; transition: opacity 1.5s ease-in-out; 
            display: flex; flex-direction: column;
        }

        .slide.active { opacity: 1; }

        /* Ajuste de Imagen */
        .slide img { 
            width: 100%;
            height: 75%; /* La imagen ocupa el 75% del alto */
            object-fit: contain; 
            background-color: #fff;
        }

        /* Estilo de la Frase por Foto */
        .phrase-container { 
            height: 25%; /* El texto ocupa el 25% restante */
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 15px;
            text-align: center;
            background: #fff; /* Fondo blanco para que resalte el texto rosa */
        }

        .phrase-container p {
            font-family: 'Dancing Script', cursive;
            font-size: 1.4rem;
            color: #ad1457;
            margin: 0;
            line-height: 1.2;
        }
    </style>
</head>
<body>

    <div id="overlay">
        <h1>¡Bienvenidos!</h1>
        <p>A una noche inolvidable...</p>
        <button id="btn" class="btn-entrar">ENTRAR A MI FIESTA</button>
    </div>

    <div class="main-content">
        <h2 class="titulo-principal">Mis 15 Años</h2>
        
        <div class="gallery">
            <div class="slide active">
                <img src="foto1.jpg" alt="Foto 1">
                <div class="phrase-container">
                    <p>"Comienza una nueva etapa llena de sueños y alegría."</p>
                </div>
            </div>

            <div class="slide">
                <img src="foto2.jpg" alt="Foto 2">
                <div class="phrase-container">
                    <p>"Cada momento compartido es un tesoro en mi corazón."</p>
                </div>
            </div>

            <div class="slide">
                <img src="foto3.jpg" alt="Foto 3">
                <div class="phrase-container">
                    <p>"Gracias por ser parte de esta noche tan especial para mí."</p>
                </div>
            </div>
        </div>
    </div>

    <audio id="player" loop>
        <source src="musica.mp3" type="audio/mpeg">
    </audio>

    <script>
        const btn = document.getElementById('btn');
        const audio = document.getElementById('player');
        const overlay = document.getElementById('overlay');
        const slides = document.querySelectorAll('.slide');
        let currentSlide = 0;

        function nextSlide() {
            if (slides.length <= 1) return;
            slides[currentSlide].classList.remove('active');
            currentSlide = (currentSlide + 1) % slides.length;
            slides[currentSlide].classList.add('active');
        }

        btn.onclick = function() {
            overlay.style.opacity = '0';
            setTimeout(() => { overlay.style.visibility = 'hidden'; }, 1000);
            audio.play().catch(e => console.log("Audio bloqueado por el navegador"));
            if (slides.length > 1) { 
                setInterval(nextSlide, 5000); 
            }
        };
    </script>
</body>
</html>
